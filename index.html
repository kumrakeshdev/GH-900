<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Page</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f7f7f7;
        color: #333;
      }
      header {
        background-color: #4a90e2;
        color: white;
        padding: 20px;
        text-align: center;
      }
      main {
        padding: 20px;
      }
      section {
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
        padding: 20px;
      }
      footer {
        text-align: center;
        padding: 15px;
        font-size: 0.9rem;
        color: #666;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Welcome to the Simple Page</h1>
      <p>A clean and minimal HTML example.</p>
    </header>
    <main>
      <section>
        <h2>About</h2>
        <p>This page is a simple HTML template with basic styling and structure.</p>
      </section>
      <section>
        <h2>Features</h2>
        <ul>
          <li>Responsive layout</li>
          <li>Clean design</li>
          <li>Easy to customize</li>
        </ul>
      </section>
    </main>
    <footer>
      <p>Created with HTML.</p>
    </footer>
  </body>
</html>
